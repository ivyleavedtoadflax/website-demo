name: Deploy site & PR previews

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency: deploy-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ponytail: static site, no build step. If a build is ever added,
      # build into ./public and point the deploy steps at it.

      - name: Deploy live site (main only)
        if: github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          clean-exclude: pr-preview/   # don't wipe open PR previews

      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: .
